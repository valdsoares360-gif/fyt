<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Downloader YouTube</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1c1c1c;
            padding: 30px;
            border-radius: 8px;
            width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Baixar vídeo do YouTube</h2>

    <form method="POST">
        <input type="text" name="url" placeholder="Cole o link do vídeo" required>
        <button type="submit">Baixar</button>
    </form>
</div>

</body>
</html>
